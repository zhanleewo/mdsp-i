<svg xmlns="http://www.w3.org/2000/svg" width="550" height="420" viewBox="0 0 550 420">
  <rect width="550" height="420" fill="#f8f9fa"/>
  
  <!-- x轴 -->
  <line x1="60" y1="340" x2="500" y2="340" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="360" font-size="16" fill="#333">x</text>
  
  <!-- y轴 -->
  <line x1="60" y1="340" x2="60" y2="40" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="40" y="50" font-size="16" fill="#333">y</text>
  
  <!-- 原点 -->
  <text x="45" y="355" font-size="14" fill="#333">O</text>
  
  <!-- 45度直线 y = x，斜率=1，从原点延伸到右上角 -->
  <line x1="60" y1="340" x2="460" y2="40" stroke="#D32F2F" stroke-width="3"/>
  <text x="470" y="50" font-size="16" fill="#D32F2F">y = x（45°）</text>

  
  <line x1="320" y1="300" x2="240" y2="200" stroke="#D32F2F" stroke-width="3"/>
  <line x1="120" y1="300" x2="120" y2="80" stroke="#D32F2F" stroke-width="3"/>
  
  <!-- 第一象限的随机点云 -->
