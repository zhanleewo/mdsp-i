        <circle cx="215" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="265" cy="220" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="235" cy="280" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="295" cy="255" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="205" cy="245" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="275" cy="225" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="225" cy="275" r="4" fill="#1E88E5" fill-opacity="0.7"/>
