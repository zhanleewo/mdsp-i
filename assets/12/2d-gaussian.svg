        <circle cx="220" cy="235" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        
        <!-- 添加一些离群点，使其更真实 -->
        <circle cx="340" cy="225" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="160" cy="275" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="270" cy="210" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="230" cy="290" r="4" fill="#1E88E5" fill-opacity="0.7"/>

    </g>

    <!-- ==================== 图例 ==================== -->
    <g transform="translate(320, 400)">
        <rect x="0" y="0" width="150" height="95" fill="white" stroke="#BDC3C7" stroke-width="1.5" rx="5"/>
        
        <!-- 椭圆 -->
        <line x1="15" y1="20" x2="35" y2="20" stroke="#4A90E2" stroke-width="2" stroke-dasharray="6,4"/>
        <text x="45" y="24" font-family="sans-serif" font-size="12" fill="#333">椭圆等高线</text>
        
        <!-- 主成分 -->
        <line x1="15" y1="40" x2="35" y2="40" stroke="#D32F2F" stroke-width="2.5"/>
        <text x="45" y="44" font-family="sans-serif" font-size="12" fill="#333">主成分方向</text>
        
        <!-- 次成分 -->
        <line x1="15" y1="60" x2="35" y2="60" stroke="#2C3E50" stroke-width="2"/>
        <text x="45" y="64" font-family="sans-serif" font-size="12" fill="#333">次成分方向</text>

        <!-- 采样点 -->
        <circle cx="25" cy="80" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <text x="45" y="84" font-family="sans-serif" font-size="12" fill="#333">随机采样点</text>
    </g>

</svg>