<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="500" height="500" fill="#F8F9FA"/>
    
    <defs>
        <!-- 坐标轴箭头 -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
        </marker>
    </defs>

    <!-- ==================== 坐标轴 ==================== -->
    <!-- x1 轴 -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="445" y="265" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">x₁</text>
    
    <!-- x2 轴 -->
    <line x1="250" y1="50" x2="250" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="260" y="55" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">x₂</text>

    <!-- 原点（中心点） -->
    <circle cx="250" cy="250" r="5" fill="#333"/>
    <text x="235" y="270" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">O</text>

    <!-- ==================== 45度旋转组 ==================== -->
    <g transform="rotate(45, 250, 250)">
        
        <!-- 1. 理论椭圆等高线（虚线） -->
        <ellipse cx="250" cy="250" rx="120" ry="50" fill="none" stroke="#4A90E2" stroke-width="2" stroke-dasharray="6,4"/>
        
        <!-- 2. 主成分方向（长轴，红色） -->
        <line x1="130" y1="250" x2="370" y2="250" stroke="#D32F2F" stroke-width="2.5"/>
        
        <!-- 3. 次成分方向（短轴，灰色） -->
        <line x1="250" y1="200" x2="250" y2="300" stroke="#2C3E50" stroke-width="2"/>

        <!-- 4. 随机采样点（椭圆分布） -->
        <!-- 中心点 -->
        <circle cx="250" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        
        <!-- 主要散布点 -->
        <circle cx="280" cy="245" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="220" cy="255" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="310" cy="240" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="190" cy="260" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="330" cy="235" r="4" fill="#1E88E5" fill-opacity="0.7"/>
