        <circle cx="210" cy="270" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="260" cy="230" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="240" cy="270" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="300" cy="220" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="200" cy="280" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="270" cy="260" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="230" cy="240" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="320" cy="225" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="180" cy="275" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="250" cy="280" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="250" cy="220" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="280" cy="255" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="220" cy="245" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="310" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="190" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="290" cy="240" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="210" cy="260" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="330" cy="245" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="170" cy="255" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="260" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="240" cy="250" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="300" cy="230" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="200" cy="270" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="270" cy="240" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="230" cy="260" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="315" cy="230" r="4" fill="#1E88E5" fill-opacity="0.7"/>
        <circle cx="185" cy="270" r="4" fill="#1E88E5" fill-opacity="0.7"/>
