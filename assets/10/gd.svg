<svg width="550" height="400" viewBox="0 0 550 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="550" height="400" fill="#f8f9fa"/>
  
  <!-- 等高线（椭圆） -->
  <ellipse cx="300" cy="200" rx="180" ry="120" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="300" cy="200" rx="130" ry="85" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="300" cy="200" rx="80" ry="50" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="300" cy="200" rx="30" ry="18" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="440" y="100" font-size="12" fill="#757575">等高线</text>
  
  <!-- 梯度下降路径 -->
  <!-- 起点 -->
  <circle cx="480" cy="100" r="6" fill="#1E88E5"/>
  <text x="490" y="95" font-size="11" fill="#1E88E5">x₀</text>
  
  <!-- 迭代点 -->
  <circle cx="430" cy="130" r="5" fill="#1E88E5"/>
  <text x="440" y="125" font-size="10" fill="#1E88E5">x₁</text>
  
  <circle cx="385" cy="155" r="5" fill="#1E88E5"/>
  <text x="395" y="150" font-size="10" fill="#1E88E5">x₂</text>
  
  <circle cx="345" cy="175" r="5" fill="#1E88E5"/>
  <text x="355" y="170" font-size="10" fill="#1E88E5">x₃</text>
  
  <circle cx="310" cy="190" r="5" fill="#1E88E5"/>
  <text x="320" y="185" font-size="10" fill="#1E88E5">x₄</text>
  
  <circle cx="300" cy="198" r="5" fill="#1E88E5"/>
  <text x="310" y="193" font-size="10" fill="#1E88E5">x₅</text>
  
  <!-- 连接线 -->
  <line x1="480" y1="100" x2="430" y2="130" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="430" y1="130" x2="385" y2="155" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="385" y1="155" x2="345" y2="175" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="345" y1="175" x2="310" y2="190" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="310" y1="190" x2="300" y2="198" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <!-- 梯度方向标注 -->
  <text x="450" y="115" font-size="10" fill="#1E88E5">-∇f</text>
  <text x="380" y="140" font-size="10" fill="#1E88E5">-∇f</text>
  
  <!-- 最优解 -->
  <circle cx="300" cy="200" r="5" fill="#D32F2F"/>
  <text x="310" y="215" font-size="11" fill="#D32F2F">x*</text>
  
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E88E5"/>
    </marker>
  </defs>
</svg>