<svg width="650" height="400" viewBox="0 0 650 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="400" fill="#f8f9fa"/>

  <!-- 等高线（狭长的椭圆，条件数大） -->
  <ellipse cx="320" cy="200" rx="200" ry="60" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="160" ry="45" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="120" ry="30" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="60" ry="15" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="480" y="100" font-size="12" fill="#757575">等高线（狭长山谷）</text>

  <!-- 普通梯度下降路径（红色，之字形） -->
  <path d="M 530 120 L 480 140 L 460 170 L 420 160 L 400 190 L 370 180 L 350 205 L 330 195 L 320 200" 
        stroke="#D32F2F" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <circle cx="530" cy="120" r="6" fill="#D32F2F"/>
  <text x="540" y="115" font-size="11" fill="#D32F2F">普通GD起点</text>
  <text x="500" y="160" font-size="11" fill="#D32F2F" transform="rotate(-30,500,160)">振荡路径</text>

  <!-- 动量法路径（蓝色，平滑） -->
  <path d="M 530 120 Q 450 110 400 140 Q 370 170 330 185 Q 320 195 320 200" 
        stroke="#1E88E5" stroke-width="3" fill="none"/>
  <circle cx="530" cy="120" r="6" fill="#1E88E5"/>
  <text x="540" y="135" font-size="11" fill="#1E88E5">动量法起点</text>
  <text x="450" y="155" font-size="11" fill="#1E88E5" transform="rotate(-20,450,155)">平滑加速路径</text>

  <!-- 最优解 -->
  <circle cx="320" cy="200" r="6" fill="#2E8B57"/>
  <text x="330" y="215" font-size="12" fill="#2E8B57">x*</text>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E88E5"/>
    </marker>
  </defs>
</svg>