<svg width="650" height="400" viewBox="0 0 650 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="400" fill="#f8f9fa"/>

  <!-- 等高线 -->
  <ellipse cx="320" cy="200" rx="200" ry="60" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="160" ry="45" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="120" ry="30" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="60" ry="15" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>

  <!-- 梯度下降路径 -->
  <path d="M 530 130 L 480 150 L 460 180 L 420 170 L 400 195 L 370 185 L 350 200 L 330 198 L 320 200" 
        stroke="#D32F2F" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  <circle cx="530" cy="130" r="6" fill="#D32F2F"/>
  <text x="540" y="125" font-size="11" fill="#D32F2F">梯度法</text>

  <!-- Newton 方法路径：一步直达 -->
  <line x1="530" y1="130" x2="320" y2="200" stroke="#1E88E5" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <circle cx="530" cy="130" r="6" fill="#1E88E5"/>
  <text x="540" y="155" font-size="11" fill="#1E88E5">Newton 方法</text>
  <text x="420" y="155" font-size="11" fill="#1E88E5" transform="rotate(-25,420,155)">一步直达最优</text>

  <!-- 最优解 -->
  <circle cx="320" cy="200" r="6" fill="#2E8B57"/>
  <text x="330" y="215" font-size="12" fill="#2E8B57">x*</text>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E88E5"/>
    </marker>
  </defs>
</svg>