<svg width="700" height="300" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="300" fill="#f8f9fa"/>
  
  <!-- 时间轴 -->
  <line x1="50" y1="250" x2="650" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="260" font-size="14">时刻 k</text>
  
  <!-- 时刻标记 -->
  <circle cx="120" cy="250" r="4" fill="#333"/>
  <text x="115" y="270" font-size="12">1</text>
  <circle cx="280" cy="250" r="4" fill="#333"/>
  <text x="275" y="270" font-size="12">2</text>
  <circle cx="440" cy="250" r="4" fill="#333"/>
  <text x="435" y="270" font-size="12">3</text>
  <circle cx="600" cy="250" r="4" fill="#333"/>
  <text x="595" y="270" font-size="12">4</text>
  
  <!-- 正确做法：一步迭代 -->
  <!-- 时刻1 -->
  <text x="120" y="50" text-anchor="middle" font-size="12" fill="#1E88E5">时刻1: 一步迭代</text>
  <circle cx="120" cy="80" r="8" fill="#1E88E5" opacity="0.7"/>
  <text x="120" y="105" text-anchor="middle" font-size="10">ω(1)</text>
  <path d="M 120 110 L 120 250" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- 时刻2 -->
  <text x="280" y="50" text-anchor="middle" font-size="12" fill="#1E88E5">时刻2: 一步迭代</text>
  <circle cx="280" cy="80" r="8" fill="#1E88E5" opacity="0.7"/>
  <text x="280" y="105" text-anchor="middle" font-size="10">ω(2)</text>
  <path d="M 280 110 L 280 250" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- 时刻3 -->
  <text x="440" y="50" text-anchor="middle" font-size="12" fill="#1E88E5">时刻3: 一步迭代</text>
  <circle cx="440" cy="80" r="8" fill="#1E88E5" opacity="0.7"/>
  <text x="440" y="105" text-anchor="middle" font-size="10">ω(3)</text>
  <path d="M 440 110 L 440 250" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- 时刻4 -->
  <text x="600" y="50" text-anchor="middle" font-size="12" fill="#1E88E5">时刻4: 一步迭代</text>
  <circle cx="600" cy="80" r="8" fill="#1E88E5" opacity="0.7"/>
  <text x="600" y="105" text-anchor="middle" font-size="10">ω(4)</text>
  <path d="M 600 110 L 600 250" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- 连接线：展示ω的演化 -->
  <path d="M 120 80 Q 200 60 280 80" stroke="#1E88E5" stroke-width="2" fill="none"/>
  <path d="M 280 80 Q 360 60 440 80" stroke="#1E88E5" stroke-width="2" fill="none"/>
  <path d="M 440 80 Q 520 60 600 80" stroke="#1E88E5" stroke-width="2" fill="none"/>
  
  <!-- 标注 -->
  <rect x="100" y="140" width="500" height="40" rx="5" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="350" y="165" text-anchor="middle" font-size="14" fill="#1E88E5">正确做法：每个时刻一步迭代 → 两域耦合 → 适应时变环境</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>