<svg width="650" height="450" viewBox="0 0 650 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="450" fill="#f8f9fa"/>
  
  <!-- 坐标轴 -->
  <line x1="80" y1="370" x2="620" y2="370" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="80" y1="370" x2="80" y2="30" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 轴标签 -->
  <text x="610" y="385" font-size="14" fill="#333">问题时间域 (时刻 k)</text>
  <text x="60" y="35" font-size="14" fill="#333">优化时间域</text>
  <text x="60" y="50" font-size="14" fill="#333">(迭代步 l)</text>
  
  <!-- 原点 -->
  <text x="70" y="390" font-size="12">O</text>
  
  <!-- 时刻标记 -->
  <circle cx="180" cy="370" r="4" fill="#333"/>
  <text x="175" y="395" font-size="12">1</text>
  <circle cx="320" cy="370" r="4" fill="#333"/>
  <text x="315" y="395" font-size="12">2</text>
  <circle cx="460" cy="370" r="4" fill="#333"/>
  <text x="455" y="395" font-size="12">3</text>
  <circle cx="580" cy="370" r="4" fill="#333"/>
  <text x="575" y="395" font-size="12">4</text>
  
  <!-- 时刻1：完整迭代 -->
  <!-- 从时刻1向下画一个长箭头 -->
  <line x1="180" y1="370" x2="180" y2="100" stroke="#D32F2F" stroke-width="4" marker-end="url(#arrowRed)"/>
  <text x="195" y="235" font-size="12" fill="#D32F2F" transform="rotate(-90,195,235)">完整迭代直到收敛</text>
  
  <!-- 从收敛点画虚线箭头到时刻2 -->
  <line x1="180" y1="100" x2="320" y2="370" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="280" y="250" text-anchor="middle" font-size="12" fill="#D32F2F">用时刻1的结果</text>
  <text x="280" y="265" text-anchor="middle" font-size="12" fill="#D32F2F">处理时刻2数据</text>
  
  
  <!-- 注释框 -->
  <rect x="90" y="410" width="470" height="35" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="325" y="433" text-anchor="middle" font-size="13" fill="#D32F2F">错误做法：每个时刻完整迭代到收敛 → 数据已变化 → 刻舟求剑</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D32F2F"/>
    </marker>
  </defs>
</svg>