<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowX" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#D32F2F"/>
    </marker>
    <marker id="arrowProj" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1E88E5"/>
    </marker>
    <marker id="arrowZ" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#FFA500"/>
    </marker>
  </defs>

  <style>
    .plane { fill: #E0E0E0; fill-opacity: 0.5; stroke: #9E9E9E; stroke-width: 2; }
    .plane-grid { stroke: #BDBDBD; stroke-width: 1.5; stroke-dasharray: 6,4; }
    .label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
    .label-z { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 20px; font-weight: bold; fill: #FFA500; }
  </style>

  <rect width="800" height="600" fill="#F8F9FA"/>

  <!-- 平面 S -->
  <polygon points="150,420 650,420 700,250 200,250" class="plane" />
  <line x1="150" y1="420" x2="650" y2="420" class="plane-grid" />
  <line x1="200" y1="250" x2="700" y2="250" class="plane-grid" />
  <line x1="150" y1="420" x2="200" y2="250" class="plane-grid" />
  <line x1="650" y1="420" x2="700" y2="250" class="plane-grid" />
  <line x1="250" y1="420" x2="300" y2="250" class="plane-grid" />
  <line x1="350" y1="420" x2="400" y2="250" class="plane-grid" />
  <line x1="450" y1="420" x2="500" y2="250" class="plane-grid" />
  <line x1="550" y1="420" x2="600" y2="250" class="plane-grid" />
  <text x="660" y="340" class="label" fill="#2E8B57" font-style="italic">S</text>

  <!-- 起点 O -->
  <circle cx="300" cy="360" r="6" fill="#333" />
  <text x="280" y="350" class="label">O</text>

  <!-- 向量 x -->
  <line x1="300" y1="360" x2="580" y2="120" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowX)"/>
  <text x="450" y="220" class="label" fill="#D32F2F">x</text>

  <!-- 投影点 Q -->
  <circle cx="580" cy="300" r="6" fill="#1E88E5" />
  <text x="590" y="290" class="label" fill="#1E88E5">Q</text>

  <!-- 投影向量 ŷ（原 proj_S x） -->
  <line x1="300" y1="360" x2="580" y2="300" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowProj)"/>
  <text x="420" y="320" class="label" fill="#1E88E5">ŷ</text>

  <!-- 残差 x-ŷ（原 e 竖直） -->
  <line x1="580" y1="120" x2="580" y2="300" stroke="#9C27B0" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="590" y="200" class="label" fill="#9C27B0">x-ŷ</text>

  <!-- 小向量 z -->
  <line x1="580" y1="300" x2="545" y2="335" stroke="#FFA500" stroke-width="2" marker-end="url(#arrowZ)"/>
  <text x="530" y="350" class="label-z" text-anchor="end">z</text>

  <!-- 虚线 d -->
  <line x1="580" y1="120" x2="545" y2="335" stroke="#2C3E50" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="560" y="240" class="label" fill="#2C3E50">d</text>
</svg>