<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
        <filter id="planeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
        </filter>

        <marker id="arrowY" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498DB"/>
        </marker>
        <marker id="arrowYHat" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#27AE60"/>
        </marker>
        <marker id="arrowE" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#E74C3C"/>
        </marker>
        <marker id="arrowX" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
    </defs>

    <style>
        .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: bold; fill: #2C3E50; }
        .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #7F8C8D; }
        .vector-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-style: italic; font-weight: bold; fill: #2C3E50; stroke: #FFFFFF; stroke-width: 4px; paint-order: stroke; }
        .point-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; fill: #2C3E50; stroke: #FFFFFF; stroke-width: 4px; paint-order: stroke; }
        .plane-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-style: italic; font-weight: bold; fill: #34495E; }
    </style>

    <rect width="800" height="600" fill="#F8F9FA" />

    <text x="400" y="50" text-anchor="middle" class="title">几何视角：向量投影到子空间</text>
    <text x="400" y="75" text-anchor="middle" class="subtitle">正交投影与线性最小均方误差估计（LMMSE）</text>

    <rect x="50" y="100" width="700" height="450" rx="15" fill="#FFFFFF" filter="url(#shadow)" />

    <!-- 子空间平面 -->
    <g id="plane-group">
        <polygon points="250,420 550,420 650,240 350,240" fill="#EAF2F8" stroke="#BDC3C7" stroke-width="2" filter="url(#planeShadow)"/>
        <polygon points="250,420 550,420 650,240 350,240" fill="rgba(52, 152, 219, 0.05)" stroke="#3498DB" stroke-width="2" stroke-dasharray="6,4"/>
        <line x1="250" y1="420" x2="650" y2="240" stroke="#BDC3C7" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
        <line x1="350" y1="240" x2="550" y2="420" stroke="#BDC3C7" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
        <text x="580" y="330" class="plane-label">子空间 M</text>
    </g>

    <!-- 坐标定义 -->
    <!-- O(250,420), H(430,312) -->
    <!-- Ŷ = H - O = (180, -108) -->
    <!-- 缩短 X，终点取 H + (90, -54) = (520, 258) -->

    <!-- 向量 X（橙色，缩短的延长方向） -->
    <g id="vector-X">
        <line x1="430" y1="312" x2="520" y2="258" stroke="#F39C12" stroke-width="5" marker-end="url(#arrowX)"/>
        <text x="480" y="280" class="vector-label">X</text>
    </g>

    <!-- 向量 Ŷ（投影） -->
    <g id="vector-YHat">
        <line x1="250" y1="420" x2="430" y2="312" stroke="#27AE60" stroke-width="5" marker-end="url(#arrowYHat)"/>
        <text x="340" y="370" class="vector-label">Ŷ</text>
    </g>

    <!-- 残差 e（竖直） -->
    <g id="vector-e">
        <line x1="430" y1="312" x2="430" y2="212" stroke="#E74C3C" stroke-width="4" stroke-dasharray="8,6" marker-end="url(#arrowE)"/>
        <text x="440" y="250" class="vector-label">e = Y - Ŷ</text>
    </g>

    <!-- 向量 Y（从 O 到 P） -->
    <g id="vector-Y">
        <line x1="250" y1="420" x2="430" y2="212" stroke="#3498DB" stroke-width="5" marker-end="url(#arrowY)"/>
        <text x="320" y="300" class="vector-label">Y</text>
    </g>

    <!-- 点标注 -->
    <g id="points">
        <circle cx="250" cy="420" r="6" fill="#2C3E50"/>
        <text x="230" y="435" class="point-label">O</text>
        
        <circle cx="430" cy="312" r="6" fill="#2C3E50"/>
        <text x="440" y="300" class="point-label">H</text>
        
        <circle cx="430" cy="212" r="6" fill="#2C3E50"/>
        <text x="440" y="200" class="point-label">P</text>
    </g>

    <!-- 直角符号 -->
    <g id="right-angle" stroke="#2C3E50" stroke-width="2.5" fill="none">
        <path d="M 430,302 L 430,312 L 440,312" />
    </g>
</svg>